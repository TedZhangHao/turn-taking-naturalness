base_config: configs/base.yaml
arguments:
  backbone: dualturn
  train_mode: full
  dualturn_fvad_head: categorical256
  head_init: random
  fvad_target_scheme: shared-binary
  dualturn_losses: all
  signal_label_cache_dir: data/cache/signals
  vad_cache_dir: data/cache/vad
  output_dir: outputs/dualturn_fvad256_all6
  train_manifest: data/manifests/train.csv
  val_manifest: data/manifests/dev.csv
  test1_manifest: data/manifests/test1.csv
  epochs: 5
  lr: 5.0e-6
  fvad_head_lr: 1.0e-4
  backbone_lr: 1.0e-6
  train_batch_size: 2
  eval_batch_size: 2
  eval_every_steps: 1500
  max_mid_eval_batches: 200
  weight_fvad: 0.125
  weight_vad: 1.0
  weight_eot: 1.0
  weight_hold: 1.0
  weight_bot: 1.0
  weight_bc: 1.0
